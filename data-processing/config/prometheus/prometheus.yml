global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: kafka-connect
    static_configs:
      - targets: ['connect:9404']

  - job_name: sales-processor-service
    static_configs:
      - targets: ['sales-processor-service:8080']
    metrics_path: /actuator/prometheus

  - job_name: consumer
    static_configs:
      - targets: ['consumer:8080']
    metrics_path: /actuator/prometheus
