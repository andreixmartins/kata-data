db:
  driverClass: org.postgresql.Driver
  url: jdbc:postgresql://marquez-db:5432/marquez
  user: marquez
  password: marquez
  properties:
    charSet: UTF-8
  maxSize: 8
  minSize: 2

server:
  applicationConnectors:
    - type: http
      port: 5000
  adminConnectors:
    - type: http
      port: 5001

logging:
  level: INFO
  loggers:
    marquez: DEBUG
