services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  init-topics:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - kafka
    entrypoint:
      - bash
      - -c
      - |
        echo "Waiting for Kafka broker..."
        cub kafka-ready -b kafka:29092 1 60
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic sales.raw.invoice.files.v1 --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic sales.processor.result.v1 --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic products.raw.postgres.v1 --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic sales.raw.shipping.webservice.v1 --partitions 1 --replication-factor 1
        echo "Topics ensured."

  connect:
    build:
      context: ./connect
    depends_on:
      - kafka
    ports:
      - "8083:8083"
      - "8181:8181"
      - "9404:9404"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:29092
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: "quickstart-connect"
      CONNECT_CONFIG_STORAGE_TOPIC: "connect-configs"
      CONNECT_OFFSET_STORAGE_TOPIC: "connect-offsets"
      CONNECT_STATUS_STORAGE_TOPIC: "connect-status"
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_KEY_CONVERTER: "org.apache.kafka.connect.storage.StringConverter"
      CONNECT_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_INTERNAL_KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_INTERNAL_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_REST_ADVERTISED_HOST_NAME: connect
      CONNECT_LOG4J_ROOT_LOGLEVEL: "INFO"
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components,/etc/kafka-connect/jars,/opt/camel-connector"
      CONNECT_PLUGIN_DISCOVERY: hybrid_warn
      KAFKA_OPTS: "-javaagent:/tmp/jmx_prometheus_javaagent.jar=9404:/etc/kafka-connect/jmx-config.yml"
    volumes:
      - ./connectors/file-processor:/data
      - ./connectors/webservice-processor/wsdl:/etc/kafka-connect/wsdl

  init-connector:
    image: curlimages/curl:latest
    depends_on:
      - connect
      - init-topics
      - postgres
    volumes:
      - ./connectors/file-processor:/config
      - ./connectors/postgres-products:/config-postgres
      - ./connectors/webservice-processor:/config-webservice
    entrypoint:
      - sh
      - -c
      - |
        mkdir -p /config/invoices /config/processed /config/error
        echo "Waiting for Kafka Connect to be ready..."
        until curl -sf http://connect:8083/connectors; do
          sleep 5
        done
        echo "Registering invoices-file-connector..."
        curl -fsS -X POST http://connect:8083/connectors \
          -H "Content-Type: application/json" \
          -d @/config/invoices-file-connector.json || echo "Invoices connector already exists."
        echo "Registering products-jdbc-source connector..."
        curl -fsS -X POST http://connect:8083/connectors \
          -H "Content-Type: application/json" \
          -d @/config-postgres/products-jdbc-connector.json || echo "Products connector already exists."
        echo "Registering shipping-webservice-source connector..."
        curl -fsS -X POST http://connect:8083/connectors \
          -H "Content-Type: application/json" \
          -d @/config-webservice/shipping-webservice-connector.json || echo "Shipping webservice connector already exists."
        echo "Connectors registered."
    restart: on-failure

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
      - connect
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://connect:8083

  sales-processor-service:
    build:
      context: ./sales-processor-service
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_started
      init-topics:
        condition: service_completed_successfully
    ports:
      - "8081:8080"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_KAFKA_PROPERTIES_APPLICATION_ID: sales-processor-service
      SPRING_KAFKA_PROPERTIES_GROUP_ID: sales-processor-service-group
      SPRING_KAFKA_PROPERTIES_STATE_DIR: /tmp/kafka-streams
      LOGGING_LEVEL_ROOT: INFO
      LOGGING_LEVEL_COM_DATA_KATA_SALES_PROCESSOR_SERVICE: DEBUG
      LOGGING_LEVEL_ORG_APACHE_KAFKA_STREAMS: INFO
    volumes:
      - /tmp/kafka-streams
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - connect

  loki:
    image: grafana/loki:3.3.2
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml

  # Grafana Alloy tails logs via the Docker API (docker.sock only). Promtail's
  # /var/lib/docker/containers mount does not work on Docker Desktop macOS/Windows.
  alloy:
    image: grafana/alloy:v1.5.1
    ports:
      - "12345:12345"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config/alloy/config.alloy:/etc/alloy/config.alloy
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - ./config/grafana/dashboards:/etc/grafana/dashboards
    depends_on:
      - prometheus
      - loki

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: productsdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - ./db/init/01-products.sql:/docker-entrypoint-initdb.d/01-products.sql
